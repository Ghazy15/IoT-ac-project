<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart AC Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Smooth fade for elements */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen overflow-hidden flex flex-col md:flex-row">

    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-wind text-4xl text-blue-500"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2 text-slate-800">Welcome Back</h2>
            <p class="text-gray-400 mb-6 text-sm">Enter Wi-Fi Credentials to connect</p>
            
            <div class="space-y-3">
                <input type="text" id="wifi-ssid" placeholder="Wi-Fi SSID" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <input type="password" id="wifi-pass" placeholder="Password" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            
            <button onclick="login()" class="w-full bg-blue-600 text-white py-4 mt-6 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition shadow-lg shadow-blue-500/30">
                Connect Dashboard
            </button>
        </div>
    </div>

    <div class="md:hidden bg-white h-16 border-b border-gray-200 flex items-center justify-between px-4 shrink-0 z-20 relative">
        <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-600">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
        <span class="font-bold text-gray-700">AC Controller</span>
        <div id="clock-mobile" class="text-xs font-mono text-gray-400 bg-gray-100 px-2 py-1 rounded">--:--</div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white border-r border-gray-200 transform -translate-x-full md:translate-x-0 md:relative transition duration-300 ease-in-out z-40 flex flex-col h-full shadow-2xl md:shadow-none">
        
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <h1 class="font-bold text-xl flex items-center gap-2 text-slate-800">
                <i class="fa-solid fa-circle-nodes text-blue-600"></i> <span class="hidden md:inline">Devices</span>
            </h1>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>

        <div id="node-list" class="flex-1 overflow-y-auto p-4 space-y-2">
            <div class="text-center text-gray-300 mt-10 text-sm">
                Scanning for ACs...
            </div>
        </div>

        <div class="p-4 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-400">System Online</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-slate-50 relative h-full overflow-hidden">
        
        <div class="hidden md:flex h-16 bg-white border-b border-gray-200 items-center justify-between px-8 shrink-0">
            <div class="font-bold text-gray-400 text-sm uppercase tracking-wider">Control Panel</div>
            <div id="clock-desktop" class="text-sm font-mono text-gray-500 bg-gray-100 px-3 py-1 rounded-full">--:--</div>
        </div>

        <div id="control-panel" class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col items-center">
            
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-gray-400 fade-in">
                <i class="fa-solid fa-arrow-left md:hidden text-3xl mb-4 animate-bounce"></i>
                <i class="fa-solid fa-arrow-left hidden md:block text-3xl mb-4 animate-bounce"></i>
                <p>Select a device from the menu</p>
            </div>

            <div id="active-interface" class="w-full max-w-md hidden fade-in pb-20">
                
                <div class="text-center mb-8">
                    <h2 id="device-name-display" class="text-2xl font-black text-slate-800 mb-1">Office AC</h2>
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-50 text-blue-600 text-xs font-bold border border-blue-100">
                        <i class="fa-solid fa-microchip"></i>
                        <span id="model-name-display">MODEL: --</span>
                    </div>
                </div>

                <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100 text-center mb-6 relative overflow-hidden group">
                    <div id="bg-status-color" class="absolute inset-0 opacity-10 bg-gray-200 transition-colors duration-500"></div>
                    
                    <div class="relative z-10">
                        <p class="text-gray-400 uppercase tracking-widest text-[10px] font-bold mb-2">TARGET TEMPERATURE</p>
                        <div class="flex items-center justify-center gap-1 mb-2">
                            <h1 id="twin-temp-display" class="text-7xl font-black text-slate-800 tracking-tighter">--</h1>
                            <span class="text-3xl text-gray-400 font-light mt-[-20px]">°C</span>
                        </div>
                        <div id="twin-status-text" class="inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-gray-200 text-gray-500 tracking-wide">
                            WAITING...
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4 mb-8">
                    <button onclick="smartAction('temp_down')" class="bg-white border-2 border-transparent active:border-blue-200 active:bg-blue-50 text-slate-600 rounded-2xl h-24 flex flex-col items-center justify-center shadow-sm hover:shadow-md transition active:scale-95 touch-manipulation">
                        <i class="fa-solid fa-minus text-xl mb-2 text-blue-400"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-400">Cooler</span>
                    </button>

                    <button onclick="smartAction('power')" id="btn-power" class="bg-slate-800 text-white rounded-2xl h-24 flex flex-col items-center justify-center shadow-lg shadow-slate-300 transition transform active:scale-95 touch-manipulation relative overflow-hidden">
                        <i class="fa-solid fa-power-off text-2xl mb-2"></i>
                        <span class="text-[10px] font-bold uppercase">Power</span>
                    </button>

                    <button onclick="smartAction('temp_up')" class="bg-white border-2 border-transparent active:border-red-200 active:bg-red-50 text-slate-600 rounded-2xl h-24 flex flex-col items-center justify-center shadow-sm hover:shadow-md transition active:scale-95 touch-manipulation">
                        <i class="fa-solid fa-plus text-xl mb-2 text-red-400"></i>
                        <span class="text-[10px] font-bold uppercase text-gray-400">Warmer</span>
                    </button>
                </div>

                <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                    <button onclick="toggleAdvanced()" class="flex items-center justify-between w-full text-xs font-bold text-gray-500 hover:text-blue-600 transition">
                        <span><i class="fa-solid fa-gear mr-2"></i> Advanced Learning</span>
                        <i class="fa-solid fa-chevron-down transform transition" id="adv-chevron"></i>
                    </button>
                    
                    <div id="advanced-area" class="hidden mt-4 pt-4 border-t border-gray-100 fade-in">
                        <div class="flex gap-2 mb-4">
                            <input id="signal-input" type="text" placeholder="Signal name (e.g. temp_24)" class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-blue-500">
                            <button onclick="sendSignal('learn')" class="bg-purple-100 text-purple-600 px-4 rounded-xl font-bold text-sm hover:bg-purple-200">
                                <i class="fa-solid fa-rss"></i>
                            </button>
                        </div>
                        <p class="text-[10px] text-gray-400 uppercase font-bold mb-2">Saved Signals</p>
                        <div id="raw-buttons" class="grid grid-cols-3 gap-2 max-h-40 overflow-y-auto pr-1 custom-scrollbar"></div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // STATE
        let nodes = {};
        let activeNodeId = null;

        /* --- MOBILE LAYOUT LOGIC --- */
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebar-overlay');
            const isOpen = !sb.classList.contains('-translate-x-full');

            if (isOpen) {
                sb.classList.add('-translate-x-full');
                ov.classList.add('hidden');
            } else {
                sb.classList.remove('-translate-x-full');
                ov.classList.remove('hidden');
            }
        }

        /* --- SMART AC LOGIC --- */
        function smartAction(type) {
            if (!activeNodeId || !nodes[activeNodeId]) return alert("Please select a device first.");
            
            const state = nodes[activeNodeId].state || {};
            const isPowerOn = state.power === true;
            let currentTemp = state.temp || 24;

            let signalToSend = "";

            if (type === 'power') {
                // If currently ON -> Send OFF. If currently OFF -> Send ON.
                signalToSend = isPowerOn ? "off" : "on";
            } 
            else if (type === 'temp_up') {
                let nextTemp = currentTemp + 1;
                if (nextTemp > 30) nextTemp = 30;
                signalToSend = "temp_" + nextTemp;
            } 
            else if (type === 'temp_down') {
                let nextTemp = currentTemp - 1;
                if (nextTemp < 16) nextTemp = 16;
                signalToSend = "temp_" + nextTemp;
            }

            console.log(`[SMART] Sending: ${signalToSend}`);
            sendSignal('send', signalToSend);
        }

        /* --- UI LOGIC --- */
        function login() {
            const ssid = document.getElementById('wifi-ssid').value;
            sessionStorage.setItem('wifi_ssid', ssid);
            document.getElementById('login-screen').classList.add('hidden');
        }

        const evtSource = new EventSource("/events");
        evtSource.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'update') {
                nodes = msg.data;
                renderSidebar();
                if (activeNodeId) updateUI();
            }
            if (msg.type === 'new_signal' && activeNodeId) fetchRawButtons(nodes[activeNodeId].model);
        };

        function renderSidebar() {
            const list = document.getElementById('node-list');
            list.innerHTML = '';
            
            const nodeKeys = Object.keys(nodes);
            if(nodeKeys.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 text-xs mt-4">Searching...</div>';
                return;
            }

            nodeKeys.forEach(key => {
                const node = nodes[key];
                const isOnline = (Date.now() - node.lastSeen) < 60000;
                const isActive = activeNodeId === node.id;
                
                const el = document.createElement('div');
                el.className = `p-4 rounded-xl border cursor-pointer transition flex justify-between items-center group ${isActive ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-transparent hover:bg-gray-50'}`;
                el.onclick = () => {
                    selectNode(node.id);
                    // On mobile, close sidebar after selection
                    if(window.innerWidth < 768) toggleSidebar();
                };
                
                el.innerHTML = `
                    <div>
                        <div class="font-bold text-sm text-slate-700 ${isActive ? 'text-blue-700' : ''}">${node.id}</div>
                        <div class="text-[10px] text-gray-400 uppercase tracking-wider">${node.model}</div>
                    </div>
                    <span class="relative flex h-2 w-2">
                      ${isOnline ? '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>' : ''}
                      <span class="relative inline-flex rounded-full h-2 w-2 ${isOnline ? 'bg-green-500' : 'bg-red-400'}"></span>
                    </span>
                `;
                list.appendChild(el);
            });
        }

        function selectNode(id) {
            activeNodeId = id;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('active-interface').classList.remove('hidden');
            
            // 1. UPDATE NAME
            document.getElementById('device-name-display').innerText = id;
            
            // 2. UPDATE MODEL NAME (FIXED)
            const model = nodes[id].model || "Unknown";
            document.getElementById('model-name-display').innerText = `MODEL: ${model.toUpperCase()}`;
            
            updateUI();
            fetchRawButtons(nodes[id].model);
        }

        function updateUI() {
            const node = nodes[activeNodeId];
            if (!node) return;
            const state = node.state || { power: false, temp: 24 };

            document.getElementById('twin-temp-display').innerText = state.temp || "--";
            
            const statusBadge = document.getElementById('twin-status-text');
            const bg = document.getElementById('bg-status-color');
            const pwrBtn = document.getElementById('btn-power');

            if (state.power) {
                statusBadge.innerText = "COOLING ACTIVE";
                statusBadge.className = "inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-blue-100 text-blue-600 tracking-wide";
                bg.className = "absolute inset-0 opacity-10 bg-blue-500 transition-colors duration-500";
                
                // Power button becomes OFF (Red Outline)
                pwrBtn.className = "bg-white border-2 border-red-100 text-red-500 rounded-2xl h-24 flex flex-col items-center justify-center shadow-sm hover:bg-red-50 transition active:scale-95";
                pwrBtn.innerHTML = '<i class="fa-solid fa-power-off text-2xl mb-1"></i><span class="text-[10px] font-bold">TURN OFF</span>';
            } else {
                statusBadge.innerText = "SYSTEM IDLE";
                statusBadge.className = "inline-block px-3 py-1 rounded-full text-[10px] font-bold bg-gray-200 text-gray-500 tracking-wide";
                bg.className = "absolute inset-0 opacity-10 bg-gray-500 transition-colors duration-500";
                
                // Power button becomes ON (Green Filled)
                pwrBtn.className = "bg-green-500 text-white rounded-2xl h-24 flex flex-col items-center justify-center shadow-lg hover:shadow-green-500/30 transition transform active:scale-95";
                pwrBtn.innerHTML = '<i class="fa-solid fa-power-off text-2xl mb-1"></i><span class="text-[10px] font-bold">TURN ON</span>';
            }
        }

        async function fetchRawButtons(model) {
            try {
                const res = await fetch(`/api/signals/${model}`);
                const signals = await res.json();
                const grid = document.getElementById('raw-buttons');
                grid.innerHTML = '';
                
                if(signals.length === 0) {
                    grid.innerHTML = '<div class="col-span-3 text-center text-gray-300 text-xs py-2">No signals learned yet</div>';
                    return;
                }

                signals.forEach(sig => {
                    const btn = document.createElement('button');
                    btn.className = "bg-gray-100 hover:bg-gray-200 p-2 rounded-lg text-[10px] font-mono text-gray-600 truncate transition";
                    btn.innerText = sig;
                    btn.onclick = () => sendSignal('send', sig);
                    grid.appendChild(btn);
                });
            } catch(e) { console.error(e); }
        }

        function toggleAdvanced() {
            const el = document.getElementById('advanced-area');
            const chevron = document.getElementById('adv-chevron');
            el.classList.toggle('hidden');
            chevron.classList.toggle('rotate-180');
        }

        async function sendSignal(action, nameOverride) {
            const name = nameOverride || document.getElementById('signal-input').value;
            if(!name) return;
            
            // Visual Feedback for Buttons
            if(action === 'send' && !nameOverride) {
                // If manual input send
            }

            try {
                await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nodeId: activeNodeId, 
                        action, 
                        name, 
                        ssid: sessionStorage.getItem('wifi_ssid') 
                    })
                });
                
                if(action === 'learn') {
                    alert("Please point remote at AC Unit and press: " + name);
                    document.getElementById('signal-input').value = '';
                }
            } catch(e) { console.error(e); }
        }

        // Clock
        setInterval(() => {
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if(document.getElementById('clock-desktop')) document.getElementById('clock-desktop').innerText = time;
            if(document.getElementById('clock-mobile')) document.getElementById('clock-mobile').innerText = time;
        }, 1000);
    </script>
</body>
</html>
